name: CI

on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt pytest
      - run: pytest -q
      # The eval run needs an API key + a vector store, so it is gated.
      # Add OPENAI_API_KEY as a repo secret to enable the eval job below.
      # - run: python eval/run_eval.py
